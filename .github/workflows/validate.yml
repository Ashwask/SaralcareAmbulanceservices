name: Validate data

on:
  pull_request:
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/validate.ts"
      - "scripts/build-api.ts"
      - "package.json"
      - "pnpm-lock.yaml"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate schemas and cross-record consistency
        run: pnpm validate

      - name: Build API artifacts (dry run)
        run: pnpm build-api

      - name: Freshness report
        run: pnpm freshness
