name: Validate data

on:
  pull_request:
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/validate.ts"
      - "scripts/build-api.ts"
      - "package.json"
      - "package-lock.json"
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Validate schemas and cross-record consistency
        run: npm run validate

      - name: Build API artifacts (dry run)
        run: npm run build-api

      - name: Freshness report
        run: npm run freshness
